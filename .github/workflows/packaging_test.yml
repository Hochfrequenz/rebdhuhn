name: "Packaging Test"

on: [ pull_request ]
jobs:
  packaging_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.14"
      - name: Build package
        run: uv build
      - name: Check package
        run: uv publish --dry-run dist/*
