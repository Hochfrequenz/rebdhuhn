name: "Linting"

on: [push]
jobs:
  pylint:
    name: Python Code Quality and Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        linter-env: ["linting", "type_check"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: 3.14
      - name: Install dependencies
        run: uv sync --group ${{ matrix.linter-env }}
      - name: Run linting
        if: matrix.linter-env == 'linting'
        run: uv run --group linting pylint rebdhuhn --ignore=_version.py
      - name: Run type_check
        if: matrix.linter-env == 'type_check'
        run: |
          uv run --group type_check mypy --show-error-codes --strict src/rebdhuhn
          uv run --group type_check mypy --show-error-codes --strict unittests
